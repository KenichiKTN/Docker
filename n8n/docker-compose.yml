services:
  postgres:
    image: postgres:15
    container_name: n8n_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest   # ← build をやめて image に戻す
    container_name: n8n_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - n8n_data:/home/node/.n8n
      - "C:/Users/kenic/Documents/DataBase:/hostdata"
    depends_on:
      postgres:
        condition: service_healthy

  sqlite_writer:
    build: ./sqlite-writer
    container_name: sqlite_writer
    restart: unless-stopped
    environment:
      - SQLITE_DB_PATH=/hostdata/株式データベース.db
      - TZ=Asia/Tokyo
    volumes:
      - "C:/Users/kenic/Documents/DataBase:/hostdata"
    ports:
      - "3000:3000"
volumes:
  n8n_postgres_data:
    external: true
  n8n_data:
    external: true
