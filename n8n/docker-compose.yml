services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - TZ=Asia/Tokyo
      - SUBDOMAINS=n8n-ktn,n8n-test-ktn
      - TOKEN=8fcd1720-8378-4e53-80ab-f44e8d12de30
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n-ktn.duckdns.org
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n-ktn.duckdns.org/
      - TZ=Asia/Tokyo
    volumes:
      - ./n8n_data:/home/node/.n8n
volumes:
  caddy_data:
  caddy_config:
