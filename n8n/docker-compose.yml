services:
  postgres:
    image: postgres:15
    container_name: n8n_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    build: .              # ← ここが重要（Dockerfileを使う）
    container_name: n8n_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - n8n_data:/home/node/.n8n
      - "C:/Users/kenic/Documents/DataBase:/hostdata"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  n8n_postgres_data:
    external: true
  n8n_data:
    external: true
